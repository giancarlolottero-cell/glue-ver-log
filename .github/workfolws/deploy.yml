name: Deploy con AWS SAM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Este es el paso de "Checkout" que limpia las rutas
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalamos SAM
      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v2

      # 3. Credenciales (Asegúrate que los nombres de los secrets coincidan con GitHub)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      # 4. SAM Build (Le decimos explícitamente que el archivo está en la raíz)
      - name: SAM Build
        run: sam build --template template.yaml

      # 5. SAM Deploy (Subimos a AWS)
      - name: SAM Deploy
        run: |
          sam deploy --no-confirm-changeset \
            --stack-name pipeline-datos-gian \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --region sa-east-1