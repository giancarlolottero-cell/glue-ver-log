name: Deploy Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Preparar archivo
        # Asegúrate de que la ruta coincida con tu carpeta real
        run: cp lambdas/test-git-gian-2/lambda_function.py ./lambda_function.py

      - name: AWS Lambda Deploy
        uses: appleboy/lambda-action@v0.2.0
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: sa-east-1
          function_name: test-git-gian-2
          source: lambda_function.py
          # QUITAMOS handler, runtime, role y publish para evitar bloqueos
          debug: true
