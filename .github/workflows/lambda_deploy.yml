name: Deploy Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:  # <--- ESTO ES LO QUE AGREGAS PARA EL BOTÓN MANUAL

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Este paso "saca" el archivo de la carpeta y lo pone en la raíz del runner
      - name: Preparar archivo
        run: cp lambdas/test-git-gian-2/lambda_function.py ./lambda_function.py

      - name: AWS Lambda Deploy
        uses: appleboy/lambda-action@v0.2.0
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: sa-east-1
          function_name: test-git-gian-2
          source: lambda_function.py
          # --- ESTO ES LO QUE FALTA PARA LA CREACIÓN ---
          handler: lambda_function.lambda_handler
          runtime: python3.12 
          role: arn:aws:iam::031418713056:role/lambda-execution-role-demo-ingenieria-datos
          # ---------------------------------------------
          debug: true
